<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>David y Goliat VR</title>
<script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
</head>

<body>

<a-scene>
 
<!-- Cielo -->

<a-sky color="#87CEEB"></a-sky>

<!-- Suelo -->
<a-plane rotation="-90 0 0" width="100" height="100" color="#c2b280"></a-plane>

<!-- Cámara con cursor de mirada -->
<a-entity camera look-controls position="0 1.6 5">
  <a-cursor 
    raycaster="objects: .clickable"
  cursor="rayOrigin: mouse"
  fuse="true" 
  fuse-timeout="1500"
  geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
  material="color: black">
  </a-cursor>
</a-entity>

<!-- David -->

<a-assets>
  <a-asset-item id="modeloDavid" src="Hitem3d-1773611771933-v2.glb"></a-asset-item>
  <a-asset-item id="modeloGoliat" src="Hitem3d-1773927456260-v1.glb"></a-asset-item>
</a-assets>

   <a-entity 
    id="david" 
    class="clickable"
    gltf-model="#modeloDavid" 
    position="-2 2.5 -5" 
    scale="4 4 4">
  </a-entity>


<!-- Piedra -->
<a-sphere id="piedra" position="-2 1.5 -5" radius="0.1" color="gray" visible="false"></a-sphere>

<!-- Goliat -->
   <a-entity 
    id="goliat" 
    gltf-model="#modeloGoliat" 
    position="2 3 -5" 
    scale="6 6 6">
  </a-entity>

<!-- Texto para iniciar -->
<a-entity id="startButton" class="clickable" position="0 3 -4">
  <a-plane width="3" height="0.8" color="#222" material="opacity: 0.8"> </a-plane>
  <a-text value="MIRA AQUI PARA INICIAR" align="center" color="white" width="6"> </a-text>
</a-entity>

<script>

// Seleccionamos los elementos
const david = document.querySelector("#david");
const piedra = document.querySelector("#piedra");
const goliat = document.querySelector("#goliat");
const startButton = document.querySelector("#startButton");

let started = false;
 
startButton.addEventListener("click", function() {
  startButton.setAttribute("visible", "false");
  started = true;
  console.log("Escena iniciada");
});
 
david.addEventListener("click", function() {
 if (!started) return;
  // 1. Animación de David: Se inclina o avanza un poco
  david.setAttribute("animation", {
    property: "position",
    to: "-1.5 2.5 -5", // Se mueve un poco hacia el centro
    dur: 500,
    easing: "easeOutQuad"
  });

  // 2. Lanzamiento de la piedra (esperamos 300ms para que coincida con el movimiento)
  setTimeout(() => {
    piedra.setAttribute("visible", true);
    piedra.setAttribute("position", "-1.5 2.5 -5"); // Sale desde la nueva posición de David
    
    piedra.setAttribute("animation", {
      property: "position",
      to: "2 2.5 -5", // Directo a la cabeza de Goliat
      dur: 1000,
      easing: "linear"
    });
  }, 300);

  // 3. Impacto en Goliat
  setTimeout(() => {
    goliat.setAttribute("animation", {
      property: "rotation",
      to: "90 0 0",
      dur: 1500,
      easing: "easeInOutQuad"
    });
  }, 1300); // 300ms de espera + 1000ms de vuelo
});

</script>

</a-scene>

</body>
</html>
